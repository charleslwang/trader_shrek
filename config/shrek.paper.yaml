account:
  name: shrek
  mode: paper
  expected_equity: 100

session:
  timezone: America/New_York
  regular_open: "09:30"
  observe_start: "09:30"
  observe_until: "10:00"
  active_start: "10:00"
  active_end: "15:30"
  flatten_start: "15:30"
  force_flat: "15:55"
  extended_hours: false

universe:
  focus: same_day_small_mid_volatility
  watchlist_size: 50
  refresh_watchlist_minutes: 45

  require_active: true
  require_tradable: true
  require_fractionable: true

  exclude_etfs: true
  exclude_mega_caps: true

  allowed_exchanges: ["NYSE", "NASDAQ", "ARCA", "BATS"]

  price_min: 2.00
  price_max: 80.00

  min_relative_volume_after_open: 1.5
  min_current_5m_dollar_volume: 250000
  min_current_15m_dollar_volume: 750000
  min_intraday_range_bps: 150
  min_abs_return_since_open_bps: 40
  max_spread_bps: 25.0

scan:
  interval_seconds: 60
  horizons_minutes: [5, 10, 15, 30, 60]
  max_new_entries_per_minute: 2
  max_trades_per_day: 100
  max_open_positions: 20

model:
  type: same_day_online_ensemble
  update_online: true
  min_observation_minutes_before_trading: 30
  min_samples_before_online_update: 50

  probability_entry_threshold_5m: 0.60
  probability_entry_threshold_10m: 0.58
  probability_entry_threshold_15m: 0.56
  probability_entry_threshold_30m: 0.55
  probability_entry_threshold_60m: 0.54

  probability_exit_threshold: 0.50
  min_expected_edge_after_cost_bps: 7.0

  ensemble:
    logistic_weight: 0.40
    bucket_weight: 0.25
    knn_weight: 0.20
    transition_weight: 0.15
    adaptive_weights: true

execution:
  long_only: true
  allow_shorts: false
  allow_options: false
  allow_market_entries: false
  allow_extended_hours: false

  entry_order_type: limit
  time_in_force: day
  entry_timeout_seconds: 15
  no_chase_after_cancel: true
  max_signal_age_seconds: 60
  limit_price_offset_bps: 2.0

  min_position_notional: 1.00
  base_position_notional: 2.00
  max_position_notional: 3.00
  max_total_exposure: 60.00
  max_symbol_exposure: 3.00
  max_same_symbol_trades_per_day: 3

risk:
  # Intentionally no PnL-based daily stop for this paper experiment
  max_daily_loss: null
  soft_daily_loss: null
  stop_after_consecutive_losses: null

  # Keep experiment-integrity controls
  kill_switch_on_broker_error: true
  kill_switch_on_reconcile_failure: true
  reject_stale_signals: true
  reject_wide_spreads: true
  reject_duplicate_symbols: true
  reject_after_flatten_start: true

exits:
  adaptive_take_profit: true
  adaptive_stop: true
  default_take_profit_pct: 0.008
  default_stop_pct: 0.005
  min_take_profit_pct: 0.006
  max_take_profit_pct: 0.018
  min_stop_pct: 0.004
  max_stop_pct: 0.012
  max_hold_minutes_5m: 8
  max_hold_minutes_10m: 15
  max_hold_minutes_15m: 20
  max_hold_minutes_30m: 40
  max_hold_minutes_60m: 75
  force_flat: true

llm:
  enabled: false
  intraday_direct_trading: false
  postmarket_review: true
  runtime: ollama
  model: qwen3:8b

logging:
  log_all_bars: true
  log_all_features: true
  log_all_predictions: true
  log_all_signals: true
  log_all_trade_intents: true
  log_all_rejections: true
  log_all_fills: true
  log_shadow_baselines: true
