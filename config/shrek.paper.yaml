account:
  name: shrek
  mode: paper
  expected_equity: 100

session:
  timezone: America/New_York
  regular_open: "09:30"
  regular_close: "16:00"
  place_orders_only_during_market_hours: true
  no_extended_hours: true

universe:
  asset_class: us_equity
  require_active: true
  require_tradable: true
  require_fractionable: true
  allow_etfs: false
  allow_options: false
  allow_shorts: false
  min_price: 2.00
  max_price: 1000.00
  min_market_cap: 100000000
  max_positions: 12
  candidate_limit_per_day: 50

portfolio:
  target_cash_reserve_pct: 0.15
  max_single_position_pct: 0.20
  starter_position_pct: 0.05
  normal_position_pct: 0.10
  max_new_buys_per_day: 3
  max_sells_per_day: 5
  rebalance_frequency_days: 5

entry_thresholds:
  min_shrek_score: 0.75
  min_expected_return_12m: 0.20
  min_upside_downside_ratio: 2.0
  min_quality_score: 0.65
  max_risk_penalty: 0.45
  min_thesis_probability: 0.70
  min_timing_score: 0.45

speculative_entry_thresholds:
  min_shrek_score: 0.82
  min_expected_return_12m: 0.30
  min_upside_downside_ratio: 3.0
  min_quality_score: 0.55
  max_risk_penalty: 0.55
  min_thesis_probability: 0.75
  min_timing_score: 0.50

exit_thresholds:
  trim_forward_return_below: 0.08
  sell_forward_return_below: 0.00
  sell_thesis_probability_below: 0.50
  review_thesis_probability_below: 0.60
  trim_upside_downside_below: 1.20
  sell_shrek_score_below: 0.55
  sell_risk_penalty_above: 0.70
  activate_trailing_after_gain: 0.30

orders:
  default_order_type: limit
  time_in_force: day
  limit_buy_discount_bps: 20
  limit_sell_premium_bps: 10
  order_timeout_minutes: 60
  allow_market_orders: false

llm:
  enabled: true
  runtime: ollama
  model: qwen3:8b
  require_json: true
  require_source_citations: true
  no_unsupported_claims: true
  max_context_chunks: 12

memory:
  shallow_decay_days: 14
  intermediate_decay_days: 120
  deep_decay_days: 1095

risk:
  no_daily_stop_loss: true
  kill_switch_on_reconcile_failure: true
  reject_if_market_closed: true
  reject_if_asset_not_fractionable: true
  reject_if_not_paper: true
